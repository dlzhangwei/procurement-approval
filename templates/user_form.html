{% extends "base.html" %}

{% block title %}{{ t("new_user") if mode == "new" else t("edit_user") }} - {{ t("app_name") }}{% endblock %}

{% block content %}
  <section class="page-heading">
    <div>
      <h1>{{ t("new_user") if mode == "new" else t("edit_user") }}</h1>
      <p>{{ t("user_form_subtitle") }}</p>
    </div>
  </section>

  <form method="post" class="form-panel">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>
      {{ t("username") }}
      <input name="username" value="{{ form.username }}" required>
    </label>
    <label>
      {{ t("display_name") }}
      <input name="display_name" value="{{ form.display_name }}">
    </label>
    <label>
      {{ t("role") }}
      <select name="role">
        {% for role, label in role_labels.items() %}
          <option value="{{ role }}" {{ 'selected' if form.role == role else '' }}>{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      {{ t("password") if mode == "new" else t("new_password") }}
      <input name="password" type="password" autocomplete="new-password" {{ "required" if mode == "new" else "" }}>
    </label>
    <label class="checkbox-line">
      <input name="is_active" type="checkbox" value="1" {{ "checked" if form.is_active == "1" else "" }}>
      {{ t("enable_account") }}
    </label>
    <div class="form-actions">
      <a class="secondary-button" href="{{ url_for('users') }}">{{ t("cancel") }}</a>
      <button type="submit" class="primary-button">{{ t("save") }}</button>
    </div>
  </form>
{% endblock %}
