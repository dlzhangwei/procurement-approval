services:
  web:
    build: .
    container_name: procurement-approval
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      TZ: America/Bogota
    volumes:
      - procurement_data:/app/instance
    networks:
      - web

volumes:
  procurement_data:

networks:
  web:
    external: true
